name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dc: [ldc-latest, dmd-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.dc }}
      - run: dub test
      - run: dub test rtmp-d:server
